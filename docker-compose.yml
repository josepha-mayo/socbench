version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: socbench
      POSTGRES_USER: socbench
      POSTGRES_PASSWORD: socbench
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socbench"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://socbench:socbench@postgres/socbench
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./backend:/app
      - ./output:/app/output

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  pgdata:
